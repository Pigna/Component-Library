name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set package version from tag
        run: npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Use package README
        run: cp PACKAGE.md README.md

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release archive
        run: |
          STAGE="pigna-component-library-${{ steps.version.outputs.VERSION }}"
          mkdir "$STAGE"
          cp -r dist "$STAGE/dist"
          cp package.json "$STAGE/package.json"
          cp README.md "$STAGE/README.md"
          cp LICENSE "$STAGE/LICENSE"
          zip -r "$STAGE.zip" "$STAGE"

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" pigna-component-library-${{ steps.version.outputs.VERSION }}.zip --title "v${{ steps.version.outputs.VERSION }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

